    methods:
      GET:
        rings:
          default:
            backend:
              url: http://zoe-onboarding-api:8790
              path: /openapi.json
            require_available: false
            entitlements:
              all_of: []
              any_of: []

  - path: /api/user-admin/openapi.json
    methods:
      GET:
        rings:
          default:
            backend:
              url: http://zoe-user-admin-api:8791
