services:
  edge-nginx:
    image: nginx:1.27-alpine
    container_name: zar-edge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.edge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sample-ui
    networks:
      - zoe_czar

  sample-ui:
    build:
      context: ./sample_frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-}
        VITE_ZAR_BASE_URL: ${VITE_ZAR_BASE_URL:-/api}
    container_name: zar-sample-ui
    expose:
      - "5174"
    depends_on:
      - zar-backend
    networks:
      - zoe_czar

  zar-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zar-backend
    environment:
      AWS_REGION: us-west-1
      ONBOARDING_SERVICE_URL: http://zoe-onboarding-api:8790
    expose:
      - "8788"
    volumes:
      - ~/.aws:/home/node/.aws:ro
    networks:
      - zoe_czar

  onboarding-api:
    build:
      context: ./onboarding
      dockerfile: Dockerfile
    container_name: zoe-onboarding-api
    environment:
      AWS_REGION: us-west-1
    expose:
      - "8790"
    volumes:
      - ~/.aws:/root/.aws:ro
    networks:
      - zoe_czar

networks:
  zoe_czar:
    name: zoe_czar
